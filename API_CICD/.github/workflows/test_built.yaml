name: Test and build

on: 
  push:
    branches: [ "main" ]
  

jobs:
  test_and_build:
    runs-on: windows-latest
    steps:
      - name: Clone du projet dans le runner 
        uses: actions/checkout@v6
      - name: Install .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Run Test
        run: dotnet test
      
